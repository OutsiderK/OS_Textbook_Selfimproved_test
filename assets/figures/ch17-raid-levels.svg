<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">RAID 层级对照</title>
  <desc id="desc">用四类图案展示 RAID0 条带化、RAID1 镜像、RAID5 分布式校验和 RAID6 更强容错。</desc>
  <rect width="920" height="420" fill="#fbfbf8"/>
  <text x="40" y="48" font-size="24" font-family="sans-serif" fill="#1f2937">RAID：把多块磁盘组织成一个更快、更可靠的阵列</text>
  <text x="40" y="78" font-size="14" font-family="sans-serif" fill="#667085">条带化提升并行度，镜像提升冗余，校验在空间与容错之间折中。</text>

  <g font-family="sans-serif" font-size="13">
    <rect x="50" y="118" width="180" height="210" rx="8" fill="#eaf4ee" stroke="#4d8d64"/>
    <text x="72" y="148" font-size="18" fill="#24543a">RAID0</text>
    <rect x="72" y="172" width="36" height="118" fill="#fff" stroke="#4d8d64"/>
    <rect x="122" y="172" width="36" height="118" fill="#fff" stroke="#4d8d64"/>
    <rect x="172" y="172" width="36" height="118" fill="#fff" stroke="#4d8d64"/>
    <text x="80" y="202" fill="#24543a">A1</text><text x="130" y="226" fill="#24543a">A2</text><text x="180" y="250" fill="#24543a">A3</text>
    <text x="72" y="314" fill="#24543a">RAID0 重在条带化性能</text>

    <rect x="270" y="118" width="180" height="210" rx="8" fill="#eef3ff" stroke="#5878b8"/>
    <text x="292" y="148" font-size="18" fill="#29406e">RAID1</text>
    <rect x="298" y="172" width="48" height="118" fill="#fff" stroke="#5878b8"/>
    <rect x="374" y="172" width="48" height="118" fill="#fff" stroke="#5878b8"/>
    <text x="313" y="225" fill="#29406e">A</text><text x="389" y="225" fill="#29406e">A</text>
    <path d="M348 224 L372 224" stroke="#29406e" stroke-width="2"/>
    <text x="292" y="314" fill="#29406e">RAID1 重在镜像冗余</text>

    <rect x="490" y="118" width="180" height="210" rx="8" fill="#fff3e8" stroke="#c77a3a"/>
    <text x="512" y="148" font-size="18" fill="#75411c">RAID5</text>
    <rect x="512" y="172" width="34" height="118" fill="#fff" stroke="#c77a3a"/>
    <rect x="556" y="172" width="34" height="118" fill="#fff" stroke="#c77a3a"/>
    <rect x="600" y="172" width="34" height="118" fill="#fff" stroke="#c77a3a"/>
    <text x="518" y="200" fill="#75411c">D</text><text x="562" y="224" fill="#75411c">D</text><text x="606" y="248" fill="#75411c">P</text>
    <text x="512" y="314" fill="#75411c">分布式校验</text>

    <rect x="710" y="118" width="180" height="210" rx="8" fill="#f3eef8" stroke="#8461a8"/>
    <text x="732" y="148" font-size="18" fill="#4e346d">RAID6</text>
    <rect x="732" y="172" width="34" height="118" fill="#fff" stroke="#8461a8"/>
    <rect x="776" y="172" width="34" height="118" fill="#fff" stroke="#8461a8"/>
    <rect x="820" y="172" width="34" height="118" fill="#fff" stroke="#8461a8"/>
    <text x="738" y="200" fill="#4e346d">D</text><text x="782" y="224" fill="#4e346d">P</text><text x="826" y="248" fill="#4e346d">Q</text>
    <text x="732" y="314" fill="#4e346d">RAID5/RAID6 体现分布式校验与更强容错</text>
  </g>
</svg>
