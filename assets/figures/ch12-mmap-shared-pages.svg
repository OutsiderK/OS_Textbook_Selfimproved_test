<svg xmlns="http://www.w3.org/2000/svg" width="900" height="390" viewBox="0 0 900 390" role="img" aria-labelledby="title desc">
  <title id="title">主存映射文件</title>
  <desc id="desc">进程地址空间中的文件页映射到同一物理页，物理页作为磁盘文件缓存并在需要时写回。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect width="900" height="390" fill="#fbfbf8"/>
  <text x="44" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#263238">mmap：把文件页放进地址空间</text>
  <rect x="70" y="80" width="210" height="118" rx="8" fill="#e8f0fe" stroke="#496c9f"/>
  <text x="118" y="110" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2933">进程 A 地址空间</text>
  <rect x="112" y="132" width="126" height="36" fill="#ffffff" stroke="#496c9f"/>
  <text x="126" y="155" font-family="Arial, sans-serif" font-size="13" fill="#1f2933">映射的文件页</text>
  <rect x="70" y="225" width="210" height="118" rx="8" fill="#e8f0fe" stroke="#496c9f"/>
  <text x="118" y="255" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2933">进程 B 地址空间</text>
  <rect x="112" y="277" width="126" height="36" fill="#ffffff" stroke="#496c9f"/>
  <text x="126" y="300" font-family="Arial, sans-serif" font-size="13" fill="#1f2933">映射的文件页</text>
  <rect x="402" y="164" width="170" height="80" rx="8" fill="#e7f5ee" stroke="#4f806a"/>
  <text x="432" y="196" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2933">共享物理页</text>
  <text x="421" y="222" font-family="Arial, sans-serif" font-size="13" fill="#1f2933">充当磁盘文件缓存</text>
  <rect x="690" y="164" width="150" height="80" rx="8" fill="#fff1d6" stroke="#a17228"/>
  <text x="724" y="197" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2933">磁盘文件页</text>
  <text x="704" y="222" font-family="Arial, sans-serif" font-size="13" fill="#1f2933">持久化副本</text>
  <line x1="238" y1="150" x2="402" y2="188" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="238" y1="295" x2="402" y2="220" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="572" y1="204" x2="690" y2="204" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="336" y="76" font-family="Arial, sans-serif" font-size="14" fill="#475569">文件页可映射进不同进程地址空间</text>
  <text x="604" y="278" font-family="Arial, sans-serif" font-size="14" fill="#475569">写回时内存数据同步到磁盘文件</text>
</svg>
