<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">进程推进顺序不当导致死锁</title>
  <desc id="desc">P 先请求读卡机再请求打印机，Q 先请求打印机再请求读卡机，若各自持有一个资源后再请求另一个资源，会相互等待。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.lane{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}.box{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:10}.wait{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:10}.hold{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:10}.t{font:16px sans-serif;fill:#111827}.small{font:14px sans-serif;fill:#475569}.label{font:18px sans-serif;font-weight:700;fill:#0f172a}.arrow{stroke:#374151;stroke-width:2.2;marker-end:url(#arrow);fill:none}.dead{stroke:#dc2626;stroke-width:2.5;stroke-dasharray:8 6;marker-end:url(#arrow);fill:none}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="920" height="430"/>
  <text class="label" x="38" y="44">进程推进顺序不当产生死锁</text>
  <rect class="lane" x="40" y="76" width="840" height="130" rx="12"/>
  <rect class="lane" x="40" y="226" width="840" height="130" rx="12"/>
  <text class="label" x="62" y="116">进程 P</text>
  <text class="label" x="62" y="266">进程 Q</text>
  <rect class="hold" x="170" y="96" width="180" height="58"/>
  <text class="t" x="192" y="123">1. 请求读卡机</text>
  <text class="small" x="214" y="145">P 持有读卡机</text>
  <rect class="wait" x="512" y="96" width="190" height="58"/>
  <text class="t" x="530" y="123">2. 请求打印机</text>
  <text class="small" x="548" y="145">被 Q 持有，只能等待</text>
  <rect class="hold" x="170" y="246" width="180" height="58"/>
  <text class="t" x="192" y="273">1. 请求打印机</text>
  <text class="small" x="214" y="295">Q 持有打印机</text>
  <rect class="wait" x="512" y="246" width="190" height="58"/>
  <text class="t" x="530" y="273">2. 请求读卡机</text>
  <text class="small" x="548" y="295">被 P 持有，只能等待</text>
  <path class="arrow" d="M355 125 H500"/>
  <path class="arrow" d="M355 275 H500"/>
  <path class="dead" d="M607 160 C650 204 650 216 607 240"/>
  <path class="dead" d="M607 240 C565 216 565 204 607 160"/>
  <text class="t" x="715" y="188">若各自持有一个资源后再请求另一个资源，会相互等待</text>
  <text class="small" x="715" y="216">执行序列：P1 -> Q1 -> P2 -> Q2</text>
  <text class="small" x="715" y="240">系统没有进程能继续推进</text>
  <text class="small" x="60" y="392">P 先请求读卡机再请求打印机；Q 先请求打印机再请求读卡机。</text>
</svg>
