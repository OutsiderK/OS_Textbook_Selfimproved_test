<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">资源轨迹图中的安全区与危险区</title>
  <desc id="desc">资源轨迹图适合两个进程和单实例资源。进入同时持有资源的危险区域可能导致死锁。t 时刻分配要判断后续轨迹是否仍安全。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.axis{stroke:#0f172a;stroke-width:3;marker-end:url(#arrow)}.grid{stroke:#cbd5e1;stroke-width:1}.danger{fill:#fed7aa;stroke:#f97316;stroke-width:1.5}.hold{fill:#bfdbfe;stroke:#2563eb;stroke-width:1.5}.path{fill:none;stroke:#dc2626;stroke-width:3;stroke-dasharray:10 7;marker-end:url(#arrow)}.safe{fill:none;stroke:#9333ea;stroke-width:3;stroke-dasharray:7 6;marker-end:url(#arrow)}.t{font:16px sans-serif;fill:#111827}.small{font:14px sans-serif;fill:#475569}.label{font:18px sans-serif;font-weight:700;fill:#0f172a}.note{font:15px sans-serif;fill:#7c2d12}
    </style>
  </defs>
  <rect class="bg" width="920" height="520"/>
  <text class="label" x="36" y="42">资源轨迹图：一次分配要看未来是否仍安全</text>
  <line class="axis" x1="110" y1="430" x2="700" y2="430"/>
  <line class="axis" x1="110" y1="430" x2="110" y2="88"/>
  <text class="label" x="720" y="436">A 进程推进</text>
  <text class="label" x="42" y="82">B 进程推进</text>
  <g>
    <line class="grid" x1="250" y1="430" x2="250" y2="108"/>
    <line class="grid" x1="390" y1="430" x2="390" y2="108"/>
    <line class="grid" x1="530" y1="430" x2="530" y2="108"/>
    <line class="grid" x1="670" y1="430" x2="670" y2="108"/>
    <line class="grid" x1="110" y1="348" x2="700" y2="348"/>
    <line class="grid" x1="110" y1="266" x2="700" y2="266"/>
    <line class="grid" x1="110" y1="184" x2="700" y2="184"/>
    <line class="grid" x1="110" y1="102" x2="700" y2="102"/>
  </g>
  <rect class="hold" x="250" y="184" width="140" height="82"/>
  <rect class="hold" x="390" y="102" width="140" height="82"/>
  <rect class="hold" x="530" y="184" width="140" height="82"/>
  <rect class="danger" x="390" y="184" width="140" height="82"/>
  <text class="note" x="408" y="229">危险区域</text>
  <path class="path" d="M110 430 H205 V348 H315 V266 H420 V225"/>
  <circle cx="420" cy="225" r="6" fill="#dc2626"/>
  <text class="label" x="428" y="220">t</text>
  <path class="safe" d="M420 225 H545 V102 H675"/>
  <text class="small" x="116" y="468">资源轨迹图适合两个进程和单实例资源；横轴/纵轴分别表示 A、B 的执行进度。</text>
  <text class="small" x="592" y="170">同时持有一个资源</text>
  <text class="small" x="592" y="192">仍可能绕开危险区</text>
  <text class="small" x="36" y="492">进入同时持有资源的危险区域可能导致死锁；t 时刻分配要判断后续轨迹是否仍安全。</text>
</svg>
