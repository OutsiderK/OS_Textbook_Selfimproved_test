<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">打印请求的数据路径</title>
  <desc id="desc">用户空间数据先进入内核缓冲区，打印控制器逐步把字符送向打印页。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#263238"/>
    </marker>
    <style>
      text { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #182024; }
      .bg { fill: #f8faf7; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .soft { fill: #e7f1ef; stroke: #507c75; stroke-width: 2; rx: 8; }
      .warn { fill: #fff4df; stroke: #a17228; stroke-width: 2; rx: 8; }
      .pink { fill: #fde8e4; stroke: #b06a52; stroke-width: 2; rx: 8; }
      .line { stroke: #263238; stroke-width: 2.4; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow); fill: none; }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 16px; }
      .tiny { font-size: 14px; fill: #475569; }
    </style>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <text class="label" x="48" y="48">从 print 调用到纸面字符</text>

  <rect class="soft" x="62" y="112" width="190" height="96"/>
  <text class="small" x="157" y="146" text-anchor="middle">用户空间字符串</text>
  <text class="tiny" x="157" y="174" text-anchor="middle">应用准备待打印字节</text>

  <rect class="warn" x="316" y="112" width="190" height="96"/>
  <text class="small" x="411" y="146" text-anchor="middle">内核缓冲区</text>
  <text class="tiny" x="411" y="174" text-anchor="middle">用户空间数据先进入内核缓冲区</text>

  <rect class="box" x="570" y="112" width="190" height="96"/>
  <text class="small" x="665" y="146" text-anchor="middle">打印机控制器</text>
  <text class="tiny" x="665" y="174" text-anchor="middle">数据寄存器与状态寄存器</text>

  <rect class="pink" x="792" y="112" width="126" height="96"/>
  <text class="small" x="855" y="146" text-anchor="middle">打印页</text>
  <text class="tiny" x="855" y="174" text-anchor="middle">字符逐步落纸</text>

  <path class="line" d="M252 160 H316"/>
  <text class="tiny" x="266" y="146">copy_from_user</text>
  <path class="line" d="M506 160 H570"/>
  <text class="tiny" x="516" y="146">写控制器寄存器</text>
  <path class="line" d="M760 160 H792"/>
  <text class="tiny" x="650" y="232">打印控制器逐步把字符送向打印页</text>

  <rect class="box" x="116" y="304" width="210" height="84"/>
  <text class="small" x="221" y="334" text-anchor="middle">程序控制 I/O</text>
  <text class="tiny" x="221" y="360" text-anchor="middle">CPU 轮询 READY 并逐字写入</text>

  <rect class="box" x="386" y="304" width="210" height="84"/>
  <text class="small" x="491" y="334" text-anchor="middle">中断驱动 I/O</text>
  <text class="tiny" x="491" y="360" text-anchor="middle">设备中断推进下一个字符</text>

  <rect class="box" x="656" y="304" width="210" height="84"/>
  <text class="small" x="761" y="334" text-anchor="middle">DMA I/O</text>
  <text class="tiny" x="761" y="360" text-anchor="middle">块传输交给 DMA 控制器</text>

  <path class="dash" d="M221 304 C250 250, 318 218, 411 208"/>
  <path class="dash" d="M491 304 C520 252, 596 218, 665 208"/>
  <path class="dash" d="M761 304 C772 254, 746 222, 665 208"/>
  <text class="tiny" x="80" y="462">三种实现的差别不在数据目的地，而在谁推进等待、传输和完成通知。</text>
</svg>
