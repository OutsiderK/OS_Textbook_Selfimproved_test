<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">从引导到用户命令执行</title>
  <desc id="desc">展示上电复位、引导程序、内核、init、后台服务和用户 shell 的控制转移。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4858"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #17252a; }
      .box { fill: #f4fbf9; stroke: #2f4858; stroke-width: 2; rx: 8; }
      .soft { fill: #fff8e8; stroke: #b8791f; stroke-width: 2; rx: 8; }
      .user { fill: #eef3ff; stroke: #365c9a; stroke-width: 2; rx: 8; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; }
      .note { font-size: 13px; fill: #3d4b52; }
      .arrow { stroke: #2f4858; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="28" y="30" width="140" height="82" class="soft"/>
  <text x="98" y="63" text-anchor="middle" class="label">上电/复位</text>
  <text x="98" y="87" text-anchor="middle" class="small">先进入固件或 BootMonitor</text>

  <rect x="210" y="30" width="150" height="82" class="box"/>
  <text x="285" y="62" text-anchor="middle" class="label">BIOS / BootMonitor</text>
  <text x="285" y="87" text-anchor="middle" class="small">定位启动设备</text>

  <rect x="402" y="30" width="150" height="82" class="box"/>
  <text x="477" y="62" text-anchor="middle" class="label">Master Boot Record</text>
  <text x="477" y="87" text-anchor="middle" class="small">MBR 指向一级引导程序</text>

  <rect x="594" y="30" width="150" height="82" class="box"/>
  <text x="669" y="62" text-anchor="middle" class="label">Stage 1 bootloader</text>
  <text x="669" y="87" text-anchor="middle" class="small">找到后续引导代码</text>

  <rect x="786" y="30" width="150" height="82" class="box"/>
  <text x="861" y="62" text-anchor="middle" class="label">Stage 2 bootloader</text>
  <text x="861" y="87" text-anchor="middle" class="small">二级引导程序装入内核</text>

  <path d="M168 71 H210" class="arrow"/>
  <path d="M360 71 H402" class="arrow"/>
  <path d="M552 71 H594" class="arrow"/>
  <path d="M744 71 H786" class="arrow"/>

  <rect x="350" y="178" width="190" height="86" class="soft"/>
  <text x="445" y="212" text-anchor="middle" class="label">Kernel</text>
  <text x="445" y="237" text-anchor="middle" class="small">内核启动后进入 init/用户空间</text>
  <path d="M861 112 C861 152, 540 146, 485 178" class="arrow"/>

  <rect x="350" y="330" width="190" height="86" class="user"/>
  <text x="445" y="360" text-anchor="middle" class="label">init / 系统初始化</text>
  <text x="445" y="384" text-anchor="middle" class="small">服务初始化过程</text>
  <path d="M445 264 V330" class="arrow"/>

  <rect x="90" y="330" width="170" height="86" class="user"/>
  <text x="175" y="359" text-anchor="middle" class="label">重要后台服务</text>
  <text x="175" y="384" text-anchor="middle" class="small">长生命周期守护进程</text>
  <path d="M350 373 H260" class="arrow"/>

  <rect x="630" y="330" width="190" height="86" class="user"/>
  <text x="725" y="359" text-anchor="middle" class="label">用户 Shell 或窗口系统</text>
  <text x="725" y="384" text-anchor="middle" class="small">用户命令触发进程执行</text>
  <path d="M540 373 H630" class="arrow"/>

  <rect x="630" y="438" width="190" height="42" class="user"/>
  <text x="725" y="464" text-anchor="middle" class="small">shell、系统调用和程序加载共同连接用户命令与内核运行</text>
  <path d="M725 416 V438" class="arrow"/>

  <text x="40" y="456" class="note">完整链条：上电/复位后先进入固件或 BootMonitor，随后逐级装入内核并进入用户空间。</text>
  <text x="40" y="478" class="note">阅读重点：这不是“开机知识点列表”，而是一条控制权从硬件固件转交到用户空间的链条。</text>
</svg>
