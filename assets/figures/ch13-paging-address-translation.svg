<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">分页地址转换流程</title>
  <desc id="desc">逻辑地址分解为页号和位移，经页表基址寄存器定位页表，查得块号后与位移拼接成物理地址。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#f8faf7"/>
  <text x="46" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#263238">页号查表，位移照抄</text>

  <text x="70" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">逻辑地址</text>
  <rect x="70" y="100" width="120" height="44" fill="#e7f1ef" stroke="#507c75"/>
  <text x="100" y="128" font-family="Arial, sans-serif" font-size="14" fill="#223">页号 p</text>
  <rect x="190" y="100" width="120" height="44" fill="#e7f1ef" stroke="#507c75"/>
  <text x="220" y="128" font-family="Arial, sans-serif" font-size="14" fill="#223">位移 d</text>
  <text x="70" y="172" font-family="Arial, sans-serif" font-size="13" fill="#475569">逻辑地址分解为页号 p 和位移 d</text>

  <rect x="70" y="230" width="200" height="44" rx="8" fill="#fde8e4" stroke="#b06a52"/>
  <text x="90" y="258" font-family="Arial, sans-serif" font-size="14" fill="#223">页表基址寄存器</text>
  <text x="70" y="302" font-family="Arial, sans-serif" font-size="13" fill="#475569">页表基址寄存器指向页表</text>
  <line x1="270" y1="252" x2="420" y2="252" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="130" y1="144" x2="130" y2="230" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="140" y="206" font-family="Arial, sans-serif" font-size="12" fill="#475569">p 作为页表内的索引</text>

  <text x="420" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">页表</text>
  <rect x="420" y="230" width="180" height="26" fill="#dde8e2" stroke="#507c75"/>
  <text x="432" y="248" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#223">页号　　块号</text>
  <rect x="420" y="256" width="180" height="26" fill="#ffffff" stroke="#507c75"/>
  <text x="432" y="274" font-family="Arial, sans-serif" font-size="12" fill="#223">0　　　　5</text>
  <rect x="420" y="282" width="180" height="26" fill="#fff4df" stroke="#a17228"/>
  <text x="432" y="300" font-family="Arial, sans-serif" font-size="12" fill="#223">p　　　　b</text>
  <text x="420" y="332" font-family="Arial, sans-serif" font-size="13" fill="#475569">页表项提供物理块号 b</text>

  <line x1="600" y1="295" x2="680" y2="295" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="680" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">物理地址</text>
  <rect x="680" y="230" width="100" height="44" fill="#eef0ff" stroke="#5f6799"/>
  <text x="702" y="258" font-family="Arial, sans-serif" font-size="14" fill="#223">块号 b</text>
  <rect x="780" y="230" width="100" height="44" fill="#eef0ff" stroke="#5f6799"/>
  <text x="802" y="258" font-family="Arial, sans-serif" font-size="14" fill="#223">位移 d</text>

  <line x1="310" y1="122" x2="830" y2="122" stroke="#8a9a8e" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="830" y1="122" x2="830" y2="230" stroke="#8a9a8e" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="620" y="112" font-family="Arial, sans-serif" font-size="12" fill="#475569">位移不参与查表，原样拼接</text>

  <text x="680" y="312" font-family="Arial, sans-serif" font-size="13" fill="#475569">物理地址保持原页内位移 d</text>
  <text x="70" y="396" font-family="Arial, sans-serif" font-size="14" fill="#475569">查表改变的只有页号到块号这一段；页内位移在转换前后保持不变。</text>
</svg>
