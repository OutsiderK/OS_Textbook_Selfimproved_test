<svg xmlns="http://www.w3.org/2000/svg" width="940" height="520" viewBox="0 0 940 520" role="img" aria-labelledby="title desc">
  <title id="title">UNIX inode 结构示意</title>
  <desc id="desc">目录项把文件名映射到 inode 号，inode 内部保存属性和多级指针。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#24435a"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #17252a; }
      .dir { fill: #eef6ff; stroke: #3867a8; stroke-width: 2; rx: 6; }
      .inode { fill: #fff4df; stroke: #b8791f; stroke-width: 2; rx: 6; }
      .ptr { fill: #edf8f3; stroke: #2f7d63; stroke-width: 1.5; rx: 4; }
      .data { fill: #f4eef9; stroke: #6b3f9c; stroke-width: 1.5; rx: 4; }
      .label { font-size: 17px; font-weight: 700; }
      .small { font-size: 13px; }
      .note { font-size: 13px; fill: #4a5a66; }
      .arrow { stroke: #24435a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="40" y="36" class="label">目录项把文件名映射到 inode 号</text>

  <rect x="40" y="56" width="220" height="60" class="dir"/>
  <text x="150" y="82" text-anchor="middle" class="label">目录项</text>
  <text x="150" y="104" text-anchor="middle" class="small">filename | inode 号</text>

  <path d="M260 86 H 310" class="arrow"/>

  <rect x="310" y="56" width="320" height="380" class="inode"/>
  <text x="470" y="82" text-anchor="middle" class="label">inode（文件控制块）</text>
  <text x="470" y="106" text-anchor="middle" class="note">inode 不直接保存文件名</text>

  <rect x="330" y="118" width="280" height="28" class="ptr"/>
  <text x="470" y="138" text-anchor="middle" class="small">mode（类型与权限位）</text>
  <rect x="330" y="150" width="280" height="28" class="ptr"/>
  <text x="470" y="170" text-anchor="middle" class="small">owner / group ID</text>
  <rect x="330" y="182" width="280" height="28" class="ptr"/>
  <text x="470" y="202" text-anchor="middle" class="small">size / flags</text>
  <rect x="330" y="214" width="280" height="28" class="ptr"/>
  <text x="470" y="234" text-anchor="middle" class="small">timestamps</text>

  <rect x="330" y="252" width="280" height="34" class="ptr"/>
  <text x="470" y="274" text-anchor="middle" class="small">direct block pointers (×12)</text>

  <rect x="330" y="292" width="280" height="28" class="ptr"/>
  <text x="470" y="312" text-anchor="middle" class="small">single indirect pointer</text>
  <rect x="330" y="326" width="280" height="28" class="ptr"/>
  <text x="470" y="346" text-anchor="middle" class="small">double indirect pointer</text>
  <rect x="330" y="360" width="280" height="28" class="ptr"/>
  <text x="470" y="380" text-anchor="middle" class="small">triple indirect pointer</text>

  <text x="470" y="416" text-anchor="middle" class="note">包含直接块指针和 single/double/triple indirect 指针</text>

  <path d="M610 269 H 690" class="arrow"/>
  <rect x="690" y="252" width="200" height="40" class="data"/>
  <text x="790" y="277" text-anchor="middle" class="small">直接数据块（12 个）</text>

  <path d="M610 306 H 690" class="arrow"/>
  <rect x="690" y="290" width="200" height="36" class="data"/>
  <text x="790" y="313" text-anchor="middle" class="small">间接块 → 数据块</text>

  <path d="M610 340 H 690" class="arrow"/>
  <rect x="690" y="324" width="200" height="36" class="data"/>
  <text x="790" y="347" text-anchor="middle" class="small">二级间接 → 间接 → 数据块</text>

  <path d="M610 374 H 690" class="arrow"/>
  <rect x="690" y="358" width="200" height="36" class="data"/>
  <text x="790" y="381" text-anchor="middle" class="small">三级间接 → 二级 → 间接 → 数据块</text>

  <text x="40" y="468" class="note">核心结论：目录项把文件名映射到 inode 号，inode 内部用直接/间接指针支撑大小不同的文件。</text>
  <text x="40" y="492" class="note">读法：从目录查到 inode 号 → 进入对应 inode → 沿直接或间接指针定位数据块。</text>
</svg>
