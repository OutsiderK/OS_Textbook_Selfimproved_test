<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">从目标代码到物理地址</title>
  <desc id="desc">源程序经编译链接形成目标代码，装入主存后逻辑地址经地址转换形成物理地址。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#f8faf7"/>
  <text x="46" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#263238">地址的两段旅程：装载之前与运行之时</text>

  <rect x="46" y="86" width="130" height="50" rx="8" fill="#e7f1ef" stroke="#507c75"/>
  <text x="78" y="116" font-family="Arial, sans-serif" font-size="15" fill="#223">源程序</text>
  <line x1="176" y1="111" x2="248" y2="111" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="182" y="100" font-family="Arial, sans-serif" font-size="13" fill="#475569">编译、链接</text>

  <rect x="248" y="72" width="250" height="118" rx="8" fill="#fff4df" stroke="#a17228"/>
  <text x="268" y="98" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#223">目标代码</text>
  <text x="268" y="124" font-family="Arial, sans-serif" font-size="13" fill="#223">静态地址系统</text>
  <text x="268" y="146" font-family="Arial, sans-serif" font-size="13" fill="#223">动态重定位系统</text>
  <text x="268" y="168" font-family="Arial, sans-serif" font-size="13" fill="#223">可执行二进制代码</text>
  <line x1="498" y1="131" x2="572" y2="131" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="120" font-family="Arial, sans-serif" font-size="13" fill="#475569">装载</text>

  <rect x="572" y="72" width="300" height="118" rx="8" fill="#eef0ff" stroke="#5f6799"/>
  <text x="592" y="98" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#223">装载方式</text>
  <text x="592" y="124" font-family="Arial, sans-serif" font-size="13" fill="#223">绝对装载：地址在装载前已固定</text>
  <text x="592" y="146" font-family="Arial, sans-serif" font-size="13" fill="#223">可重定位装载：装入时一次改地址</text>
  <text x="592" y="168" font-family="Arial, sans-serif" font-size="13" fill="#223">动态运行时装载：访问时才转换</text>

  <text x="46" y="232" font-family="Arial, sans-serif" font-size="13" fill="#475569">目标代码可包含静态地址系统、动态重定位系统或可执行二进制代码，差别在于地址何时被绑定。</text>

  <rect x="120" y="280" width="190" height="56" rx="8" fill="#e7f1ef" stroke="#507c75"/>
  <text x="158" y="314" font-family="Arial, sans-serif" font-size="15" fill="#223">逻辑地址</text>
  <line x1="310" y1="308" x2="540" y2="308" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="354" y="282" width="140" height="34" rx="8" fill="#fde8e4" stroke="#b06a52"/>
  <text x="378" y="304" font-family="Arial, sans-serif" font-size="14" fill="#223">地址转换</text>
  <rect x="540" y="280" width="190" height="56" rx="8" fill="#eef0ff" stroke="#5f6799"/>
  <text x="578" y="314" font-family="Arial, sans-serif" font-size="15" fill="#223">物理地址</text>

  <text x="120" y="376" font-family="Arial, sans-serif" font-size="14" fill="#475569">逻辑地址经地址转换形成物理地址，转换可以发生在装载时，也可以推迟到每次访存时。</text>
</svg>
