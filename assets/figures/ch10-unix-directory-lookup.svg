<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">UNIX 目录检索：用户视角与系统视角</title>
  <desc id="desc">用户看到的是目录树，系统通过目录项中的 inode 号链接目录和文件。</desc>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#24435a"/>
    </marker>
    <style>
      text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #17252a; }
      .panel { fill: #f7fafc; stroke: #9eb3c6; stroke-width: 1.5; rx: 8; }
      .dir { fill: #eef6ff; stroke: #3867a8; stroke-width: 2; rx: 4; }
      .ent { fill: #fff4df; stroke: #b8791f; stroke-width: 1.5; rx: 4; }
      .ino { fill: #edf8f3; stroke: #2f7d63; stroke-width: 1.5; rx: 4; }
      .file { fill: #f4eef9; stroke: #6b3f9c; stroke-width: 1.5; rx: 4; }
      .head { font-size: 18px; font-weight: 700; }
      .small { font-size: 13px; }
      .mono { font-size: 13px; font-family: "Source Code Pro", monospace; }
      .note { font-size: 12px; fill: #4a5a66; }
      .line { stroke: #607d8b; stroke-width: 1.5; fill: none; }
      .arrow { stroke: #24435a; stroke-width: 2; fill: none; marker-end: url(#arrow3); }
    </style>
  </defs>

  <!-- Left: user view -->
  <rect x="20" y="30" width="420" height="490" class="panel"/>
  <text x="230" y="58" text-anchor="middle" class="head">用户视角：用户看到的是目录树</text>

  <rect x="200" y="80" width="60" height="28" class="dir"/>
  <text x="230" y="99" text-anchor="middle" class="small">/</text>

  <rect x="120" y="140" width="80" height="28" class="dir"/>
  <text x="160" y="159" text-anchor="middle" class="small">usr</text>
  <rect x="260" y="140" width="80" height="28" class="dir"/>
  <text x="300" y="159" text-anchor="middle" class="small">bin</text>

  <path d="M230 108 L 160 140" class="line"/>
  <path d="M230 108 L 300 140" class="line"/>

  <rect x="80" y="200" width="80" height="28" class="dir"/>
  <text x="120" y="219" text-anchor="middle" class="small">include</text>
  <rect x="170" y="200" width="80" height="28" class="dir"/>
  <text x="210" y="219" text-anchor="middle" class="small">local</text>

  <path d="M160 168 L 120 200" class="line"/>
  <path d="M160 168 L 210 200" class="line"/>

  <rect x="60" y="260" width="120" height="28" class="file"/>
  <text x="120" y="279" text-anchor="middle" class="small">testfile.c</text>

  <path d="M120 228 L 120 260" class="line"/>

  <text x="230" y="334" text-anchor="middle" class="note">用户只关心 /usr/include/testfile.c 这样的路径</text>
  <text x="230" y="356" text-anchor="middle" class="note">用户看不到 inode 号，也不直接接触磁盘块</text>
  <text x="230" y="392" text-anchor="middle" class="head">每个目录都额外包含：</text>
  <rect x="80" y="408" width="120" height="28" class="ent"/>
  <text x="140" y="427" text-anchor="middle" class="mono">.  → 自身</text>
  <rect x="220" y="408" width="160" height="28" class="ent"/>
  <text x="300" y="427" text-anchor="middle" class="mono">..  → 父目录</text>
  <text x="230" y="462" text-anchor="middle" class="note">. 和 .. 目录项参与路径检索</text>
  <text x="230" y="484" text-anchor="middle" class="note">读取 ../foo 时由 .. 把路径回退到父目录</text>

  <!-- Right: system view -->
  <rect x="460" y="30" width="500" height="490" class="panel"/>
  <text x="710" y="58" text-anchor="middle" class="head">系统视角：通过 inode 号链接</text>

  <text x="710" y="84" text-anchor="middle" class="note">目录项只保存文件名和 inode 号</text>

  <rect x="480" y="98" width="200" height="28" class="ent"/>
  <text x="580" y="118" text-anchor="middle" class="mono">filename (14B) | inode 号 (2B)</text>

  <text x="580" y="146" text-anchor="middle" class="note">文件名字段 14 字节；inode 节点号字段 2 字节</text>

  <!-- Directory file -->
  <rect x="480" y="170" width="220" height="180" class="dir"/>
  <text x="590" y="190" text-anchor="middle" class="small">目录文件 /usr/include</text>
  <rect x="500" y="200" width="180" height="26" class="ent"/>
  <text x="590" y="218" text-anchor="middle" class="mono">.            17</text>
  <rect x="500" y="228" width="180" height="26" class="ent"/>
  <text x="590" y="246" text-anchor="middle" class="mono">..           4</text>
  <rect x="500" y="256" width="180" height="26" class="ent"/>
  <text x="590" y="274" text-anchor="middle" class="mono">testfile.c   42</text>
  <rect x="500" y="284" width="180" height="26" class="ent"/>
  <text x="590" y="302" text-anchor="middle" class="mono">stdio.h      43</text>
  <rect x="500" y="312" width="180" height="26" class="ent"/>
  <text x="590" y="330" text-anchor="middle" class="mono">……</text>

  <!-- inode table -->
  <rect x="740" y="170" width="200" height="60" class="ino"/>
  <text x="840" y="190" text-anchor="middle" class="small">inode #42</text>
  <text x="840" y="210" text-anchor="middle" class="mono">mode / size / blocks</text>

  <rect x="740" y="244" width="200" height="60" class="ino"/>
  <text x="840" y="264" text-anchor="middle" class="small">inode #43</text>
  <text x="840" y="284" text-anchor="middle" class="mono">mode / size / blocks</text>

  <path d="M680 269 H 740" class="arrow"/>
  <path d="M680 297 H 740" class="arrow"/>

  <rect x="740" y="324" width="200" height="40" class="file"/>
  <text x="840" y="349" text-anchor="middle" class="small">数据块（文件内容）</text>

  <path d="M840 304 L 840 324" class="arrow"/>

  <text x="710" y="396" text-anchor="middle" class="note">系统通过目录项中的 inode 号链接目录和文件</text>
  <text x="710" y="418" text-anchor="middle" class="note">同一个 inode 可被多个目录项引用 → 硬链接的基础</text>
  <text x="710" y="450" text-anchor="middle" class="note">查找 /usr/include/testfile.c 时：</text>
  <text x="710" y="472" text-anchor="middle" class="note">从根目录开始，逐级用名字查目录项 → 取 inode 号 → 再读下一级目录</text>
  <text x="710" y="494" text-anchor="middle" class="note">把名字与 inode 分开，重命名、链接和移动都可以只改目录项</text>
</svg>
