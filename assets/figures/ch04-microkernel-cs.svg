<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">微内核的客户/服务器结构</title>
  <desc id="desc">在微内核结构中，设备驱动、文件服务、虚拟存储管理与安全服务都作为用户态服务进程运行，微内核留在核心态，只提供消息传递等基本机制，客户进程与服务进程通过微内核转发的消息交互。</desc>
  <defs>
    <style>
      text { font-family: Arial, "Noto Sans CJK SC", sans-serif; fill: #17252a; }
      .frame { fill: #fbfaf6; }
      .userband { fill: #f3f8ff; stroke: #3867a8; stroke-width: 1.4; stroke-dasharray: 6 4; }
      .kernelband { fill: #fff4dc; stroke: #b8791f; stroke-width: 1.4; stroke-dasharray: 6 4; }
      .client { fill: #eef6ff; stroke: #3867a8; stroke-width: 1.8; }
      .server { fill: #e7f7ef; stroke: #2f8f5b; stroke-width: 1.8; }
      .micro { fill: #fff1d6; stroke: #b8791f; stroke-width: 2; }
      .label { font-size: 18px; font-weight: 700; }
      .comp-label { font-size: 14px; font-weight: 700; }
      .band { font-size: 14px; font-weight: 700; fill: #2f4858; }
      .sub { font-size: 12px; fill: #3d4b52; }
      .note { font-size: 13px; fill: #3d4b52; }
      .arrow { stroke: #6b7780; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6b7780"/>
    </marker>
  </defs>
  <rect width="800" height="500" class="frame"/>
  <text x="40" y="40" class="label" font-size="22">微内核（客户/服务器）结构</text>
  <text x="40" y="64" class="sub">设计原则：策略与机制分离</text>

  <!-- user mode band -->
  <rect x="40" y="84" width="720" height="150" class="userband"/>
  <text x="56" y="104" class="band">用户态</text>
  <rect x="70" y="120" width="150" height="92" class="client"/>
  <text x="145" y="160" text-anchor="middle" class="comp-label">用户进程</text>
  <text x="145" y="182" text-anchor="middle" class="sub">客户</text>

  <rect x="250" y="120" width="120" height="92" class="server"/>
  <text x="310" y="160" text-anchor="middle" class="comp-label">设备驱动</text>
  <text x="310" y="182" text-anchor="middle" class="sub">服务器</text>
  <rect x="384" y="120" width="120" height="92" class="server"/>
  <text x="444" y="160" text-anchor="middle" class="comp-label">文件服务</text>
  <text x="444" y="182" text-anchor="middle" class="sub">服务器</text>
  <rect x="518" y="120" width="120" height="92" class="server"/>
  <text x="578" y="153" text-anchor="middle" class="comp-label">虚拟存储</text>
  <text x="578" y="173" text-anchor="middle" class="comp-label">管理</text>
  <rect x="652" y="120" width="96" height="92" class="server"/>
  <text x="700" y="160" text-anchor="middle" class="comp-label">安全服务</text>

  <!-- kernel mode band -->
  <rect x="40" y="300" width="720" height="96" class="kernelband"/>
  <text x="56" y="320" class="band">核心态</text>
  <rect x="70" y="328" width="678" height="56" class="micro"/>
  <text x="409" y="354" text-anchor="middle" class="label" font-size="16">微内核</text>
  <text x="409" y="374" text-anchor="middle" class="sub">只保留进程切换、消息传递等最基本机制</text>

  <!-- message passing arrows -->
  <line x1="145" y1="212" x2="145" y2="328" class="arrow" marker-end="url(#ar2)"/>
  <line x1="145" y1="328" x2="145" y2="212" class="arrow" marker-end="url(#ar2)"/>
  <line x1="310" y1="328" x2="310" y2="212" class="arrow" marker-end="url(#ar2)"/>
  <line x1="444" y1="328" x2="444" y2="212" class="arrow" marker-end="url(#ar2)"/>
  <line x1="578" y1="328" x2="578" y2="212" class="arrow" marker-end="url(#ar2)"/>
  <text x="409" y="270" text-anchor="middle" class="sub">客户与服务器之间的请求由微内核以消息传递转发</text>

  <!-- notes carrying the teaching points -->
  <text x="40" y="438" class="note">设备驱动、文件服务、虚拟存储管理、安全服务在用户态</text>
  <text x="40" y="460" class="note">微内核留在核心态</text>
</svg>
