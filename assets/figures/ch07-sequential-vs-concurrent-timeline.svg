<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">顺序执行与并发执行的时间线对照</title>
  <desc id="desc">上半部分是输入、处理、输出顺序串行的时间线，下半部分是三个进程重叠推进的并发时间线。</desc>
  <rect x="20" y="20" width="920" height="520" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="52" text-anchor="middle" font-size="22" font-family="sans-serif" fill="#0f172a">同一组输入—处理—输出：顺序组织与并发组织</text>

  <text x="80" y="92" font-size="15" font-family="sans-serif" fill="#1e3a8a">顺序执行：输入 78ms、处理 52ms、输出 20ms 顺序串行，一个周期 150ms</text>
  <rect x="80" y="106" width="250" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="205" y="131" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#1e3a8a">输入 78ms</text>
  <rect x="330" y="106" width="166" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="413" y="131" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#166534">处理 52ms</text>
  <rect x="496" y="106" width="64" height="40" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
  <text x="528" y="131" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#92400e">输出</text>
  <rect x="560" y="106" width="250" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6" opacity="0.45"/>
  <text x="685" y="131" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1e3a8a" opacity="0.7">下一周期的输入…</text>
  <line x1="80" y1="158" x2="560" y2="158" stroke="#94a3b8" stroke-width="1"/>
  <text x="320" y="176" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#475569">一个周期 150ms，处理器只在中间 52ms 工作</text>

  <text x="80" y="206" font-size="14" font-family="sans-serif" fill="#475569">处理器利用率按处理时间除以总周期计算：52/150 ≈ 35%</text>
  <text x="80" y="230" font-size="14" font-family="sans-serif" fill="#991b1b">顺序设计使 I/O 与处理器难以重叠：输入和输出期间处理器只能空等</text>

  <line x1="60" y1="252" x2="900" y2="252" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="6 5"/>

  <text x="80" y="282" font-size="15" font-family="sans-serif" fill="#1e3a8a">并发执行：并发重叠输入、处理和输出阶段，稳定后每 78ms 完成一批</text>

  <text x="160" y="318" text-anchor="end" font-size="13" font-family="sans-serif" fill="#1e3a8a">输入设备</text>
  <rect x="170" y="298" width="195" height="32" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
  <text x="267" y="319" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1e3a8a">I 第 1 批</text>
  <rect x="365" y="298" width="195" height="32" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
  <text x="462" y="319" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1e3a8a">I 第 2 批</text>
  <rect x="560" y="298" width="195" height="32" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
  <text x="657" y="319" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1e3a8a">I 第 3 批</text>

  <text x="160" y="368" text-anchor="end" font-size="13" font-family="sans-serif" fill="#166534">处理器</text>
  <rect x="365" y="348" width="130" height="32" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
  <text x="430" y="369" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">P 第 1 批</text>
  <rect x="560" y="348" width="130" height="32" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
  <text x="625" y="369" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">P 第 2 批</text>
  <rect x="755" y="348" width="130" height="32" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
  <text x="820" y="369" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">P 第 3 批</text>

  <text x="160" y="418" text-anchor="end" font-size="13" font-family="sans-serif" fill="#92400e">输出设备</text>
  <rect x="495" y="398" width="50" height="32" fill="#fef3c7" stroke="#d97706" stroke-width="1.4"/>
  <text x="520" y="419" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#92400e">O₁</text>
  <rect x="690" y="398" width="50" height="32" fill="#fef3c7" stroke="#d97706" stroke-width="1.4"/>
  <text x="715" y="419" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#92400e">O₂</text>
  <rect x="885" y="398" width="50" height="32" fill="#fef3c7" stroke="#d97706" stroke-width="1.4" opacity="0.8"/>
  <text x="910" y="419" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#92400e">O₃</text>

  <line x1="365" y1="296" x2="365" y2="438" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="560" y1="296" x2="560" y2="438" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="462" y="452" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#475569">第 2 批输入时，处理器正在算第 1 批</text>

  <text x="80" y="490" font-size="14" font-family="sans-serif" fill="#475569">稳定阶段吞吐受最长阶段制约：最长的输入段 78ms 决定流水线节拍</text>
  <text x="80" y="514" font-size="14" font-family="sans-serif" fill="#166534">效率相比顺序设计提高：稳定后处理器利用率约 52/78 ≈ 67%</text>
</svg>
