<svg xmlns="http://www.w3.org/2000/svg" width="980" height="580" viewBox="0 0 980 580" role="img" aria-labelledby="title desc">
  <title id="title">Clock 与改进 Clock 的替换判断</title>
  <desc id="desc">Clock 用环形队列实现第二次机会；改进 Clock 结合引用位和修改位选择替换对象。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#263238"/>
    </marker>
    <style>
      text { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #182024; }
      .box { fill: #f8fbfc; stroke: #263238; stroke-width: 2; rx: 8; }
      .soft { fill: #eef7f4; stroke: #52796f; stroke-width: 2; rx: 8; }
      .warn { fill: #fff4e6; stroke: #9a5b00; stroke-width: 2; rx: 8; }
      .ring { fill: #ffffff; stroke: #384b9b; stroke-width: 2.2; }
      .line { stroke: #263238; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #66767c; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .label { font-weight: 700; font-size: 22px; }
      .small { font-size: 17px; }
      .tiny { font-size: 15px; }
    </style>
  </defs>
  <rect x="20" y="20" width="940" height="540" fill="#ffffff" stroke="#d7dee2" stroke-width="2" rx="10"/>
  <text class="label" x="58" y="62">Clock：把 FIFO 队列弯成一个环</text>

  <circle class="ring" cx="260" cy="252" r="132"/>
  <circle class="soft" cx="260" cy="120" r="42"/>
  <text class="small" x="260" y="114" text-anchor="middle">页 A</text>
  <text class="tiny" x="260" y="138" text-anchor="middle">R=1</text>
  <circle class="ring" cx="388" cy="252" r="42"/>
  <text class="small" x="388" y="246" text-anchor="middle">页 B</text>
  <text class="tiny" x="388" y="270" text-anchor="middle">R=0</text>
  <circle class="soft" cx="260" cy="384" r="42"/>
  <text class="small" x="260" y="378" text-anchor="middle">页 C</text>
  <text class="tiny" x="260" y="402" text-anchor="middle">R=1</text>
  <circle class="ring" cx="132" cy="252" r="42"/>
  <text class="small" x="132" y="246" text-anchor="middle">页 D</text>
  <text class="tiny" x="132" y="270" text-anchor="middle">R=0</text>

  <path class="line" d="M154 128 C190 86, 241 75, 260 78"/>
  <text class="tiny" x="66" y="126">扫描指针</text>
  <path class="dash" d="M300 121 C360 145, 394 188, 389 210"/>
  <text class="tiny" x="404" y="176">引用位非 0 时将其置 0 并移动指针</text>
  <path class="line" d="M348 252 H430"/>
  <text class="tiny" x="430" y="246">引用位为 0 时替换指针所指页面</text>
  <text class="small" x="260" y="452" text-anchor="middle">环形队列实现第二次机会思想</text>

  <rect class="box" x="570" y="90" width="332" height="86"/>
  <text class="small" x="736" y="124" text-anchor="middle">改进时钟算法结合引用位和修改位</text>
  <text class="tiny" x="736" y="151" text-anchor="middle">页面状态写成 (r, m)，既看近期访问，也看写回代价</text>

  <rect class="soft" x="586" y="220" width="132" height="64"/>
  <text class="small" x="652" y="247" text-anchor="middle">(0,0)</text>
  <text class="tiny" x="652" y="270" text-anchor="middle">未引用 未修改</text>
  <rect class="box" x="746" y="220" width="132" height="64"/>
  <text class="small" x="812" y="247" text-anchor="middle">(0,1)</text>
  <text class="tiny" x="812" y="270" text-anchor="middle">未引用 已修改</text>
  <rect class="box" x="586" y="330" width="132" height="64"/>
  <text class="small" x="652" y="357" text-anchor="middle">(1,0)</text>
  <text class="tiny" x="652" y="380" text-anchor="middle">已引用 未修改</text>
  <rect class="warn" x="746" y="330" width="132" height="64"/>
  <text class="small" x="812" y="357" text-anchor="middle">(1,1)</text>
  <text class="tiny" x="812" y="380" text-anchor="middle">已引用 已修改</text>

  <path class="line" d="M652 220 V184"/>
  <text class="tiny" x="688" y="205">优先选择最近未引用且未修改的页</text>
  <path class="dash" d="M812 394 C804 452, 684 454, 652 394"/>
  <text class="tiny" x="608" y="488">若需要可多轮扫描并在扫描过程中调整引用位</text>
</svg>
