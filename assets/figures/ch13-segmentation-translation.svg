<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="title desc">
  <title id="title">分段地址转换</title>
  <desc id="desc">逻辑地址由段号和段内地址组成，经作业表定位段表，段表项给出段始址和段长度。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <rect width="920" height="440" fill="#f8faf7"/>
  <text x="46" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#263238">先找段表，再按基址加偏移</text>

  <text x="70" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">逻辑地址</text>
  <rect x="70" y="102" width="130" height="44" fill="#e7f1ef" stroke="#507c75"/>
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="14" fill="#223">段号 s</text>
  <rect x="200" y="102" width="160" height="44" fill="#e7f1ef" stroke="#507c75"/>
  <text x="222" y="130" font-family="Arial, sans-serif" font-size="14" fill="#223">段内地址 w</text>
  <text x="70" y="174" font-family="Arial, sans-serif" font-size="13" fill="#475569">逻辑地址由段号和段内地址组成</text>

  <rect x="70" y="232" width="190" height="56" rx="8" fill="#fde8e4" stroke="#b06a52"/>
  <text x="92" y="258" font-family="Arial, sans-serif" font-size="14" fill="#223">作业表</text>
  <text x="92" y="278" font-family="Arial, sans-serif" font-size="12" fill="#475569">段表始址、段表长度</text>
  <text x="70" y="318" font-family="Arial, sans-serif" font-size="13" fill="#475569">作业表定位该作业的段表</text>
  <line x1="260" y1="260" x2="400" y2="260" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="135" y1="146" x2="135" y2="232" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="400" y="222" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">段表</text>
  <rect x="400" y="232" width="240" height="26" fill="#dde8e2" stroke="#507c75"/>
  <text x="412" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#223">段号　　段始址　　段长度</text>
  <rect x="400" y="258" width="240" height="26" fill="#fff4df" stroke="#a17228"/>
  <text x="412" y="276" font-family="Arial, sans-serif" font-size="12" fill="#223">s　　　　B　　　　 L</text>
  <text x="400" y="312" font-family="Arial, sans-serif" font-size="13" fill="#475569">段表项包含段始址和段长度</text>
  <text x="400" y="334" font-family="Arial, sans-serif" font-size="13" fill="#475569">先比较 w 与 L，越界则中断</text>

  <line x1="640" y1="271" x2="720" y2="271" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="720" y="222" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">主存中的段</text>
  <rect x="720" y="232" width="150" height="100" fill="#eef0ff" stroke="#5f6799"/>
  <text x="736" y="258" font-family="Arial, sans-serif" font-size="13" fill="#223">段始址 B</text>
  <text x="736" y="284" font-family="Arial, sans-serif" font-size="13" fill="#223">+ 段内地址 w</text>
  <text x="736" y="310" font-family="Arial, sans-serif" font-size="13" fill="#223">= 物理地址</text>

  <line x1="280" y1="124" x2="795" y2="160" stroke="#8a9a8e" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="795" y1="160" x2="795" y2="232" stroke="#8a9a8e" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="560" y="140" font-family="Arial, sans-serif" font-size="12" fill="#475569">w 作为段内偏移参与相加</text>

  <text x="70" y="396" font-family="Arial, sans-serif" font-size="14" fill="#475569">与分页不同，段长不固定，所以物理地址是基址加偏移算出来的，而不是块号拼位移。</text>
</svg>
