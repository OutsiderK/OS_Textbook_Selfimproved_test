<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330" role="img" aria-labelledby="title desc">
  <title id="title">相关进程组成的输入—处理—输出流水线</title>
  <desc id="desc">输入进程、处理进程和输出进程通过两个缓冲区串接，数据沿箭头方向流动。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect x="20" y="20" width="920" height="290" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="56" text-anchor="middle" font-size="22" font-family="sans-serif" fill="#0f172a">相关进程组成的输入—处理—输出流水线</text>

  <rect x="80" y="110" width="120" height="64" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="148" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#1e3a8a">I 进程</text>

  <rect x="250" y="110" width="120" height="64" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="310" y="148" text-anchor="middle" font-size="15" font-family="sans-serif" fill="#334155">缓冲区 1</text>

  <rect x="420" y="110" width="120" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="480" y="148" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#166534">P 进程</text>

  <rect x="590" y="110" width="120" height="64" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="650" y="148" text-anchor="middle" font-size="15" font-family="sans-serif" fill="#334155">缓冲区 2</text>

  <rect x="760" y="110" width="120" height="64" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="820" y="148" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#92400e">O 进程</text>

  <line x1="200" y1="142" x2="250" y2="142" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="225" y="130" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#334155">①</text>
  <line x1="370" y1="142" x2="420" y2="142" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="395" y="130" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#334155">②</text>
  <line x1="540" y1="142" x2="590" y2="142" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="565" y="130" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#334155">②</text>
  <line x1="710" y1="142" x2="760" y2="142" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="735" y="130" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#334155">③</text>

  <text x="80" y="216" font-size="14" font-family="sans-serif" fill="#475569">① I 进程向缓冲区发送输入结果　② P 进程接收输入并发送处理结果　③ O 进程接收输出数据</text>
  <text x="80" y="246" font-size="14" font-family="sans-serif" fill="#1e3a8a">相关进程通过缓冲区交换信息：缓冲区既传递数据，也带来"满了要等、空了要等"的同步需求</text>
  <text x="80" y="276" font-size="13" font-family="sans-serif" fill="#94a3b8">三个进程可以分别处在不同批次的数据上，于是输入、处理、输出得以重叠</text>
</svg>
