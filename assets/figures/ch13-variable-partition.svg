<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">可变分区的布局演变与分配表</title>
  <desc id="desc">作业到达与完成驱动可变分区布局变化，右侧是最终状态对应的已分配区表与未分配区表。</desc>
  <rect width="920" height="500" fill="#f8faf7"/>
  <text x="46" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#263238">分区随作业到达与完成而变化</text>

  <text x="70" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">1. 初始布局</text>
  <rect x="70" y="90" width="140" height="19" fill="#fde8e4" stroke="#b06a52"/>
  <text x="78" y="104" font-family="Arial, sans-serif" font-size="11" fill="#223">OS</text>
  <rect x="70" y="109" width="140" height="35" fill="#fff4df" stroke="#a17228"/>
  <text x="78" y="130" font-family="Arial, sans-serif" font-size="11" fill="#223">Job1（8K 起，15K）</text>
  <rect x="70" y="144" width="140" height="70" fill="#fff4df" stroke="#a17228"/>
  <text x="78" y="182" font-family="Arial, sans-serif" font-size="11" fill="#223">Job2（23K 起，30K）</text>
  <rect x="70" y="214" width="140" height="24" fill="#ffffff" stroke="#8a9a8e" stroke-dasharray="4 3"/>
  <text x="78" y="230" font-family="Arial, sans-serif" font-size="11" fill="#475569">空闲 10K</text>
  <rect x="70" y="238" width="140" height="23" fill="#fff4df" stroke="#a17228"/>
  <text x="78" y="254" font-family="Arial, sans-serif" font-size="11" fill="#223">Job3</text>
  <rect x="70" y="261" width="140" height="129" fill="#ffffff" stroke="#8a9a8e" stroke-dasharray="4 3"/>
  <text x="78" y="330" font-family="Arial, sans-serif" font-size="11" fill="#475569">空闲 55K</text>

  <text x="240" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">2. Job2 完成</text>
  <rect x="240" y="90" width="140" height="19" fill="#fde8e4" stroke="#b06a52"/>
  <text x="248" y="104" font-family="Arial, sans-serif" font-size="11" fill="#223">OS</text>
  <rect x="240" y="109" width="140" height="35" fill="#fff4df" stroke="#a17228"/>
  <text x="248" y="130" font-family="Arial, sans-serif" font-size="11" fill="#223">Job1</text>
  <rect x="240" y="144" width="140" height="70" fill="#e7f1ef" stroke="#507c75"/>
  <text x="248" y="174" font-family="Arial, sans-serif" font-size="11" fill="#223">空闲 30K</text>
  <text x="248" y="192" font-family="Arial, sans-serif" font-size="11" fill="#475569">（Job2 释放）</text>
  <rect x="240" y="214" width="140" height="24" fill="#ffffff" stroke="#8a9a8e" stroke-dasharray="4 3"/>
  <text x="248" y="230" font-family="Arial, sans-serif" font-size="11" fill="#475569">空闲 10K</text>
  <rect x="240" y="238" width="140" height="23" fill="#fff4df" stroke="#a17228"/>
  <text x="248" y="254" font-family="Arial, sans-serif" font-size="11" fill="#223">Job3</text>
  <rect x="240" y="261" width="140" height="129" fill="#ffffff" stroke="#8a9a8e" stroke-dasharray="4 3"/>
  <text x="248" y="330" font-family="Arial, sans-serif" font-size="11" fill="#475569">空闲 55K</text>

  <text x="410" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">3. Job4 到达</text>
  <rect x="410" y="90" width="140" height="19" fill="#fde8e4" stroke="#b06a52"/>
  <text x="418" y="104" font-family="Arial, sans-serif" font-size="11" fill="#223">OS</text>
  <rect x="410" y="109" width="140" height="35" fill="#fff4df" stroke="#a17228"/>
  <text x="418" y="130" font-family="Arial, sans-serif" font-size="11" fill="#223">Job1</text>
  <rect x="410" y="144" width="140" height="70" fill="#fff4df" stroke="#a17228"/>
  <text x="418" y="182" font-family="Arial, sans-serif" font-size="11" fill="#223">Job4（23K—53K）</text>
  <rect x="410" y="214" width="140" height="24" fill="#ffffff" stroke="#8a9a8e" stroke-dasharray="4 3"/>
  <text x="418" y="230" font-family="Arial, sans-serif" font-size="11" fill="#475569">空闲 10K</text>
  <rect x="410" y="238" width="140" height="23" fill="#fff4df" stroke="#a17228"/>
  <text x="418" y="254" font-family="Arial, sans-serif" font-size="11" fill="#223">Job3（63K—73K）</text>
  <rect x="410" y="261" width="140" height="129" fill="#ffffff" stroke="#8a9a8e" stroke-dasharray="4 3"/>
  <text x="418" y="330" font-family="Arial, sans-serif" font-size="11" fill="#475569">空闲 55K</text>

  <text x="600" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">已分配区表（状态 3）</text>
  <rect x="600" y="90" width="280" height="26" fill="#dde8e2" stroke="#507c75"/>
  <text x="612" y="108" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#223">作业　　起始地址　　长度</text>
  <rect x="600" y="116" width="280" height="26" fill="#ffffff" stroke="#507c75"/>
  <text x="612" y="134" font-family="Arial, sans-serif" font-size="12" fill="#223">Job1　　8K　　　　 15K</text>
  <rect x="600" y="142" width="280" height="26" fill="#ffffff" stroke="#507c75"/>
  <text x="612" y="160" font-family="Arial, sans-serif" font-size="12" fill="#223">Job4　　23K　　　　30K</text>
  <rect x="600" y="168" width="280" height="26" fill="#ffffff" stroke="#507c75"/>
  <text x="612" y="186" font-family="Arial, sans-serif" font-size="12" fill="#223">Job3　　63K　　　　10K</text>

  <text x="600" y="232" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#38505a">未分配区表（状态 3）</text>
  <rect x="600" y="244" width="280" height="26" fill="#dde8e2" stroke="#507c75"/>
  <text x="612" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#223">起始地址　　长度</text>
  <rect x="600" y="270" width="280" height="26" fill="#ffffff" stroke="#507c75"/>
  <text x="612" y="288" font-family="Arial, sans-serif" font-size="12" fill="#223">53K　　　　 10K</text>
  <rect x="600" y="296" width="280" height="26" fill="#ffffff" stroke="#507c75"/>
  <text x="612" y="314" font-family="Arial, sans-serif" font-size="12" fill="#223">73K　　　　 55K</text>

  <text x="600" y="352" font-family="Arial, sans-serif" font-size="12" fill="#475569">已分配区包含 Job1、Job4、Job3</text>
  <text x="600" y="372" font-family="Arial, sans-serif" font-size="12" fill="#475569">未分配区包含 53K 长 10K 与 73K 长 55K 两段</text>

  <text x="70" y="424" font-family="Arial, sans-serif" font-size="13" fill="#475569">Job2 完成后形成可复用空闲区；Job4 到达后占据 23K 至 53K 区间；Job3 位于 63K 至 73K 区间。</text>
  <text x="70" y="448" font-family="Arial, sans-serif" font-size="13" fill="#475569">动态分区管理需要同时维护空闲与已分配信息，两张表随每次分配和回收同步更新。</text>
</svg>
