<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">请求分页中的 MMU、TLB 与缺页路径</title>
  <desc id="desc">逻辑地址先进入 MMU，MMU 先查快表，再查页表，必要时触发缺页中断并从辅存调页。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#263238"/>
    </marker>
    <style>
      .box { fill: #f8fbfc; stroke: #263238; stroke-width: 2; rx: 8; }
      .soft { fill: #f2f7e9; stroke: #5d6f2f; stroke-width: 2; rx: 8; }
      .warn { fill: #fff4e6; stroke: #9a5b00; stroke-width: 2; rx: 8; }
      .mem { fill: #eef2ff; stroke: #384b9b; stroke-width: 2; rx: 8; }
      .line { stroke: #263238; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6c7a80; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      text { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #182024; font-size: 20px; }
      .small { font-size: 17px; }
      .tiny { font-size: 15px; }
      .label { font-weight: 700; }
    </style>
  </defs>

  <rect x="26" y="24" width="1068" height="572" fill="#ffffff" stroke="#d7dee2" stroke-width="2" rx="10"/>

  <rect class="box" x="60" y="76" width="176" height="82"/>
  <text class="label" x="148" y="111" text-anchor="middle">CPU</text>
  <text class="small" x="148" y="138" text-anchor="middle">CPU 逻辑地址先进入 MMU</text>

  <rect class="box" x="304" y="56" width="220" height="128"/>
  <text class="label" x="414" y="92" text-anchor="middle">MMU</text>
  <text class="small" x="414" y="121" text-anchor="middle">逻辑地址分解为页号和页内地址</text>
  <text class="small" x="414" y="149" text-anchor="middle">MMU 依据页表把逻辑页号转换为物理页框号</text>
  <text class="small" x="414" y="174" text-anchor="middle">页内偏移在转换过程中保持不变</text>

  <rect class="soft" x="608" y="62" width="214" height="96"/>
  <text class="label" x="715" y="98" text-anchor="middle">快表 TLB</text>
  <text class="small" x="715" y="127" text-anchor="middle">快表命中直接得到页框号</text>
  <text class="tiny" x="715" y="149" text-anchor="middle">快表命中直接形成物理地址访问主存用户区</text>

  <rect class="mem" x="608" y="232" width="254" height="130"/>
  <text class="label" x="735" y="266" text-anchor="middle">主存系统区：进程页表</text>
  <text class="small" x="735" y="294" text-anchor="middle">快表不命中需访问主存页表</text>
  <text class="small" x="735" y="322" text-anchor="middle">快表不命中则访问主存系统区中的进程页表</text>
  <text class="small" x="735" y="350" text-anchor="middle">页表命中后可把转换结果装入快表</text>

  <rect class="mem" x="900" y="82" width="160" height="94"/>
  <text class="label" x="980" y="119" text-anchor="middle">主存用户区</text>
  <text class="small" x="980" y="148" text-anchor="middle">按物理地址访存</text>

  <rect class="warn" x="426" y="420" width="296" height="114"/>
  <text class="label" x="574" y="455" text-anchor="middle">缺页中断处理</text>
  <text class="small" x="574" y="480" text-anchor="middle">页表不命中产生缺页中断</text>
  <text class="small" x="574" y="505" text-anchor="middle">MMU 可在转换中触发缺页或越界中断</text>
  <text class="tiny" x="574" y="528" text-anchor="middle">页表不命中进入缺页中断处理并从辅存调页、改表</text>

  <rect class="soft" x="800" y="438" width="214" height="78"/>
  <text class="label" x="907" y="471" text-anchor="middle">辅存页面</text>
  <text class="small" x="907" y="500" text-anchor="middle">读入缺失页面</text>

  <text class="small" x="60" y="36">进程切换时装入运行进程页表基址</text>

  <path class="line" d="M236 117 H304"/>
  <path class="line" d="M524 104 H608"/>
  <path class="line" d="M822 110 H900"/>
  <path class="dash" d="M524 154 C560 194, 576 240, 608 280"/>
  <path class="line" d="M862 294 C914 262, 948 220, 970 176"/>
  <path class="dash" d="M735 362 C713 398, 676 421, 650 440"/>
  <path class="line" d="M722 482 H800"/>
  <path class="line" d="M907 438 C888 392, 842 366, 782 342"/>
  <path class="dash" d="M710 235 C675 200, 684 160, 706 158"/>

  <text class="tiny" x="552" y="89">查快表</text>
  <text class="tiny" x="554" y="230">未命中</text>
  <text class="tiny" x="892" y="260">页表命中后装入快表并继续访问</text>
  <text class="tiny" x="748" y="408">缺页</text>
</svg>
