<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">有限缓冲区：in/out 指针与 counter</title>
  <desc id="desc">k 个单元组成环形缓冲区，生产者沿 in 指针放入产品，消费者沿 out 指针取出产品，counter 记录产品数量。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect x="20" y="20" width="920" height="420" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="54" text-anchor="middle" font-size="22" font-family="sans-serif" fill="#0f172a">有限缓冲区：in/out 指针与 counter</text>

  <circle cx="480" cy="225" r="148" fill="none" stroke="#e2e8f0" stroke-width="1.6" stroke-dasharray="5 5"/>

  <rect x="567" y="205" width="56" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="595" y="230" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">产品</text>
  <rect x="533" y="124" width="56" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="561" y="149" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">产品</text>
  <rect x="452" y="90" width="56" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="480" y="115" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">产品</text>
  <rect x="371" y="124" width="56" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6"/>
  <rect x="337" y="205" width="56" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6"/>
  <rect x="371" y="286" width="56" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6"/>
  <rect x="452" y="320" width="56" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6"/>
  <rect x="533" y="286" width="56" height="40" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="480" y="231" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#64748b">k 个单元</text>

  <rect x="60" y="100" width="150" height="60" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="135" y="136" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#1e3a8a">生产者进程</text>
  <line x1="210" y1="135" x2="367" y2="142" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="280" y="122" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#2563eb">in 指针（下一个空位）</text>

  <rect x="750" y="195" width="150" height="60" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="825" y="231" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#92400e">消费者进程</text>
  <line x1="627" y1="225" x2="746" y2="225" stroke="#d97706" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="687" y="212" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#92400e">out 指针（最早的产品）</text>

  <rect x="700" y="80" width="190" height="42" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
  <text x="795" y="107" text-anchor="middle" font-size="15" font-family="sans-serif" fill="#334155">counter = 3</text>

  <text x="80" y="398" font-size="14" font-family="sans-serif" fill="#475569">生产者通过 in 指针放入产品；消费者通过 out 指针取出产品；counter 记录缓冲区中产品数量</text>
  <text x="80" y="424" font-size="14" font-family="sans-serif" fill="#991b1b">环形缓冲区容量有限：满（counter=k）则生产者必须等，空（counter=0）则消费者必须等</text>
</svg>
