<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">哲学家进餐：五个进程与五个共享资源</title>
  <desc id="desc">五名哲学家围绕圆桌，相邻哲学家之间各放一把叉子，每人需要左右两把叉子才能进餐。</desc>
  <rect x="20" y="20" width="920" height="480" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="480" y="54" text-anchor="middle" font-size="22" font-family="sans-serif" fill="#0f172a">哲学家进餐：五个进程、五个共享资源</text>

  <circle cx="480" cy="255" r="105" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
  <text x="480" y="261" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#64748b">圆桌</text>

  <circle cx="480" cy="105" r="36" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="111" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1e3a8a">哲学家 1</text>
  <circle cx="637" cy="209" r="36" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="637" y="215" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1e3a8a">哲学家 2</text>
  <circle cx="577" cy="389" r="36" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="577" y="395" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1e3a8a">哲学家 3</text>
  <circle cx="383" cy="389" r="36" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="383" y="395" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1e3a8a">哲学家 4</text>
  <circle cx="323" cy="209" r="36" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="323" y="215" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1e3a8a">哲学家 5</text>

  <line x1="544" y1="146" x2="558" y2="170" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <text x="576" y="150" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">叉 1</text>
  <line x1="590" y1="280" x2="566" y2="293" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <text x="612" y="295" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">叉 2</text>
  <line x1="480" y1="361" x2="480" y2="388" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <text x="480" y="408" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">叉 3</text>
  <line x1="370" y1="280" x2="394" y2="293" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <text x="348" y="295" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">叉 4</text>
  <line x1="416" y1="146" x2="402" y2="170" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <text x="384" y="150" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">叉 5</text>

  <text x="760" y="160" font-size="13" font-family="sans-serif" fill="#475569">每名哲学家左右各有一把叉子，</text>
  <text x="760" y="180" font-size="13" font-family="sans-serif" fill="#475569">相邻两人共享中间那一把</text>

  <text x="80" y="452" font-size="14" font-family="sans-serif" fill="#475569">每个哲学家需要左右两把叉子才能进餐；每把叉子只能被一个哲学家持有</text>
  <text x="80" y="478" font-size="14" font-family="sans-serif" fill="#991b1b">所有人先拿一把叉子会形成相互等待：人人持一把、等一把，谁也凑不齐两把</text>
</svg>
