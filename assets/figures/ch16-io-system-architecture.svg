<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470" role="img" aria-labelledby="title desc">
  <title id="title">I/O 系统的硬件与软件组成</title>
  <desc id="desc">I/O 系统同时包含硬件组成和管理软件，主存与外围设备之间有输入和输出两个数据方向。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{rx:8;stroke-width:2}.hw{fill:#e0f2fe;stroke:#0284c7}.sw{fill:#ecfdf5;stroke:#059669}.mem{fill:#fff7ed;stroke:#c2410c}.t{font:15px Arial,sans-serif;fill:#0f172a}.label{font:21px Arial,sans-serif;font-weight:700;fill:#0f172a}.small{font:13px Arial,sans-serif;fill:#475569}.edge{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="920" height="470"/>
  <text class="label" x="42" y="44">I/O 系统同时包含硬件组成和管理软件</text>
  <text class="small" x="42" y="72">硬件负责连接与传送，管理软件负责命名、调度、缓冲、分配和错误处理。</text>

  <rect class="box mem" x="60" y="172" width="170" height="92"/>
  <text class="label" x="114" y="211">主存</text>
  <text class="small" x="88" y="239">数据源与数据目的地</text>

  <rect class="box hw" x="340" y="92" width="190" height="64"/>
  <text class="t" x="374" y="130">通道</text>
  <rect class="box hw" x="340" y="190" width="190" height="64"/>
  <text class="t" x="382" y="228">控制部件</text>
  <rect class="box hw" x="340" y="288" width="190" height="64"/>
  <text class="t" x="363" y="326">I/O 设备及接口电路</text>

  <rect class="box sw" x="650" y="150" width="190" height="132"/>
  <text class="label" x="700" y="190">管理软件</text>
  <text class="small" x="678" y="222">设备独立性</text>
  <text class="small" x="678" y="246">缓冲与分配</text>
  <text class="small" x="678" y="270">驱动与中断响应</text>

  <path class="edge" d="M230 198 C278 130 292 124 340 124"/>
  <path class="edge" d="M230 218 L340 222"/>
  <path class="edge" d="M230 238 C278 314 292 320 340 320"/>
  <path class="edge" d="M530 124 C578 124 602 174 650 174"/>
  <path class="edge" d="M530 222 L650 216"/>
  <path class="edge" d="M530 320 C584 320 602 258 650 258"/>

  <path d="M230 374 C360 430 520 430 650 374" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M650 392 C520 450 360 450 230 392" stroke="#7c2d12" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text class="t" x="363" y="404">主存与外围设备之间有输入和输出两个数据方向</text>
  <text class="small" x="54" y="424">输入：外设数据进入主存</text>
  <text class="small" x="676" y="424">输出：主存数据送往外设</text>
</svg>
