<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">文件共享中的位移指针关系</title>
  <desc id="desc">比较同一系统打开文件表项和不同系统打开文件表项带来的 f_offset 共享差异。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f4f"/>
    </marker>
  </defs>
  <rect width="920" height="420" fill="#f8faf7"/>
  <text x="46" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#263238">同一位移指针与不同位移指针</text>
  <text x="62" y="86" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#38505a">A. 多个 fd 指向同一系统打开文件表项</text>
  <rect x="62" y="112" width="120" height="54" rx="8" fill="#e7f1ef" stroke="#507c75"/>
  <text x="86" y="145" font-family="Arial, sans-serif" font-size="15" fill="#223">fd 3</text>
  <rect x="62" y="188" width="120" height="54" rx="8" fill="#e7f1ef" stroke="#507c75"/>
  <text x="86" y="221" font-family="Arial, sans-serif" font-size="15" fill="#223">fd 4</text>
  <rect x="270" y="138" width="210" height="82" rx="8" fill="#fff4df" stroke="#a17228"/>
  <text x="292" y="169" font-family="Arial, sans-serif" font-size="15" fill="#223">系统打开文件表项</text>
  <text x="292" y="195" font-family="Arial, sans-serif" font-size="14" fill="#223">共享同一个文件位移指针</text>
  <rect x="575" y="151" width="148" height="56" rx="8" fill="#eef0ff" stroke="#5f6799"/>
  <text x="614" y="185" font-family="Arial, sans-serif" font-size="15" fill="#223">活动 inode</text>
  <line x1="182" y1="139" x2="270" y2="164" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="182" y1="215" x2="270" y2="194" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="179" x2="575" y2="179" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="62" y="276" font-family="Arial, sans-serif" font-size="14" fill="#475569">一次读写会影响其他共享者看到的当前位置</text>
  <line x1="46" y1="302" x2="874" y2="302" stroke="#cbd5cf" stroke-width="1"/>
  <text x="62" y="338" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#38505a">B. 多个系统打开文件表项可指向同一活动 inode</text>
  <rect x="62" y="360" width="126" height="42" rx="8" fill="#e7f1ef" stroke="#507c75"/>
  <text x="82" y="386" font-family="Arial, sans-serif" font-size="14" fill="#223">fd 5</text>
  <rect x="252" y="330" width="206" height="54" rx="8" fill="#fff4df" stroke="#a17228"/>
  <text x="272" y="362" font-family="Arial, sans-serif" font-size="14" fill="#223">系统打开文件表项 f_offset=100</text>
  <rect x="252" y="392" width="206" height="22" rx="6" fill="#fff4df" stroke="#a17228"/>
  <text x="272" y="408" font-family="Arial, sans-serif" font-size="12" fill="#223">每个系统打开文件表项有独立 f_offset</text>
  <rect x="575" y="350" width="148" height="54" rx="8" fill="#eef0ff" stroke="#5f6799"/>
  <text x="614" y="382" font-family="Arial, sans-serif" font-size="15" fill="#223">同一活动 inode</text>
  <line x1="188" y1="381" x2="252" y2="360" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="458" y1="360" x2="575" y2="373" stroke="#2f4f4f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="730" y="378" font-family="Arial, sans-serif" font-size="14" fill="#475569">文件内容共享但读写当前位置独立</text>
</svg>
